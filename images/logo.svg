  <line stroke="#6b0a1e" stroke-width="3" x1="155" y1="178" x2="117" y2="168"/>
  <line stroke="#6b0a1e" stroke-width="3" x1="117" y1="168" x2="103" y2="130"/>
  <line stroke="#6b0a1e" stroke-width="3" x1="103" y1="130" x2="112" y2="91"/>
  <line stroke="#6b0a1e" stroke-width="3" x1="112" y1="91"  x2="155" y2="78"/>

